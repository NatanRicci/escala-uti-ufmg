<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala UTI-UFMG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-50: #E6F1FB;
    --blue-200: #85B7EB;
    --blue-400: #378ADD;
    --blue-600: #185FA5;
    --blue-800: #0C447C;
    --green-50: #EAF3DE;
    --green-400: #639922;
    --green-600: #3B6D11;
    --teal-50: #E1F5EE;
    --teal-400: #1D9E75;
    --teal-600: #0F6E56;
    --gray-50: #F7F7F5;
    --gray-100: #EFEFEB;
    --gray-300: #C8C7BE;
    --gray-500: #888780;
    --gray-700: #444441;
    --gray-900: #1A1A18;
    --red-50: #FCEBEB;
    --red-400: #E24B4A;
    --red-600: #A32D2D;
    --bg: #F4F3EF;
    --surface: #FFFFFF;
    --text: #1A1A18;
    --text-muted: #666662;
    --text-hint: #999994;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --radius: 10px;
    --radius-lg: 16px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 12px rgba(0,0,0,0.04);
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #141413;
      --surface: #1E1E1C;
      --text: #F0EFE9;
      --text-muted: #9A9991;
      --text-hint: #666660;
      --border: rgba(255,255,255,0.08);
      --border-strong: rgba(255,255,255,0.15);
      --gray-50: #2A2A28;
      --gray-100: #232321;
      --blue-50: #0D1E33;
      --green-50: #0E1F08;
      --teal-50: #061E14;
      --red-50: #1F0D0D;
    }
  }

  html { font-size: 16px; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* Header */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .header-icon {
    width: 40px; height: 40px;
    background: var(--blue-600);
    border-radius: var(--radius);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .header-icon svg { width: 22px; height: 22px; fill: none; stroke: #fff; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
  .header-text h1 { font-family: 'DM Serif Display', serif; font-size: 18px; font-weight: 400; color: var(--text); letter-spacing: -0.01em; }
  .header-text p { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .header-notif { margin-left: auto; }
  .btn-notif {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; font-size: 13px; font-weight: 500;
    border-radius: 999px; border: 1px solid var(--border-strong);
    background: transparent; color: var(--text-muted); cursor: pointer;
    transition: all 0.15s; font-family: 'DM Sans', sans-serif;
  }
  .btn-notif:hover { background: var(--gray-100); color: var(--text); }
  .btn-notif.active { background: var(--green-50); border-color: var(--green-600); color: var(--green-600); }
  .btn-notif svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }

  /* Main layout */
  main { max-width: 700px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  /* Stats row */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    box-shadow: var(--shadow);
  }
  .stat-label { font-size: 11px; font-weight: 500; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .stat-value { font-size: 28px; font-weight: 600; color: var(--text); line-height: 1; }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

  /* Calendar card */
  .calendar-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 1.25rem;
  }

  /* Calendar nav */
  .cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .cal-nav-title { font-family: 'DM Serif Display', serif; font-size: 17px; font-weight: 400; color: var(--text); text-transform: capitalize; }
  .cal-nav-btns { display: flex; gap: 4px; }
  .btn-nav {
    width: 32px; height: 32px; border-radius: 8px;
    border: 1px solid var(--border); background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--text-muted); transition: all 0.12s;
  }
  .btn-nav:hover { background: var(--gray-100); color: var(--text); }
  .btn-nav svg { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

  /* Calendar grid */
  .cal-body { padding: 1rem 1.25rem 1.25rem; }
  .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 6px; }
  .weekday { text-align: center; font-size: 11px; font-weight: 500; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 0; }
  .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }

  .day {
    aspect-ratio: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 8px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
    background: transparent;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .day:hover { background: var(--gray-100); border-color: var(--border); }
  .day.empty { cursor: default; pointer-events: none; }
  .day.today { border-color: var(--green-400); }
  .day.plantao {
    background: var(--blue-50);
    border-color: var(--blue-400);
  }
  .day.plantao:hover { background: #CCE0F5; }
  .day-num { font-size: 14px; font-weight: 500; color: var(--text); line-height: 1; }
  .day.today .day-num { color: var(--green-600); font-weight: 600; }
  .day.plantao .day-num { color: var(--blue-600); }
  .day-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--blue-400); margin-top: 3px; }
  .day.today::after {
    content: '';
    position: absolute;
    bottom: 5px;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--green-400);
  }
  .day.plantao.today::after { display: none; }

  /* Legend */
  .legend { display: flex; gap: 16px; padding: 0 1.25rem 1rem; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-muted); }
  .legend-swatch { width: 12px; height: 12px; border-radius: 3px; }
  .swatch-plantao { background: var(--blue-400); }
  .swatch-today { background: var(--green-400); }

  /* Next shifts */
  .section-title { font-size: 12px; font-weight: 500; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
  .next-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
    margin-bottom: 1.25rem;
  }
  .next-item {
    display: flex; align-items: center;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    transition: background 0.1s;
  }
  .next-item:last-child { border-bottom: none; }
  .next-item:hover { background: var(--gray-50); }
  .next-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue-400); flex-shrink: 0; }
  .next-dot.soon { background: var(--teal-400); }
  .next-info { flex: 1; }
  .next-date { font-size: 14px; font-weight: 500; color: var(--text); }
  .next-weekday { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .next-badge {
    font-size: 11px; font-weight: 500; padding: 3px 8px;
    border-radius: 999px; background: var(--teal-50);
    color: var(--teal-600); border: 1px solid var(--teal-600);
  }
  .next-remove {
    width: 26px; height: 26px; border-radius: 6px; border: 1px solid var(--border);
    background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--text-hint); transition: all 0.12s;
  }
  .next-remove:hover { background: var(--red-50); border-color: var(--red-400); color: var(--red-600); }
  .next-remove svg { width: 13px; height: 13px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; }
  .next-empty { padding: 20px 16px; font-size: 13px; color: var(--text-hint); text-align: center; }

  /* Toast */
  #toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--gray-900); color: #fff; font-size: 13px; font-weight: 500;
    padding: 10px 20px; border-radius: 999px; white-space: nowrap;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
    opacity: 0; pointer-events: none; z-index: 100;
    font-family: 'DM Sans', sans-serif;
  }
  #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

  /* Hint */
  .hint { font-size: 12px; color: var(--text-hint); text-align: center; margin-top: -0.5rem; margin-bottom: 1.25rem; }

  @media (max-width: 480px) {
    main { padding: 1rem 0.75rem 3rem; }
    .stat-value { font-size: 22px; }
    .day-num { font-size: 13px; }
    header { padding: 0.875rem 1rem; }
    .header-text h1 { font-size: 16px; }
    .btn-notif span { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="12" y1="14" x2="12" y2="18"/><line x1="10" y1="16" x2="14" y2="16"/></svg>
  </div>
  <div class="header-text">
    <h1>Escala UTI-UFMG</h1>
    <p>Clique nos dias para marcar plantões</p>
  </div>
  <div class="header-notif">
    <button class="btn-notif" id="btn-notif" onclick="requestNotif()">
      <svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span id="notif-label">Ativar alertas</span>
    </button>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>

  <div class="calendar-card">
    <div class="cal-nav">
      <button class="btn-nav" onclick="changeMonth(-1)" aria-label="Mês anterior">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span class="cal-nav-title" id="cal-title"></span>
      <button class="btn-nav" onclick="changeMonth(1)" aria-label="Próximo mês">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="cal-body">
      <div class="weekdays">
        <div class="weekday">Dom</div><div class="weekday">Seg</div><div class="weekday">Ter</div>
        <div class="weekday">Qua</div><div class="weekday">Qui</div><div class="weekday">Sex</div><div class="weekday">Sáb</div>
      </div>
      <div class="days-grid" id="days-grid"></div>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-swatch swatch-plantao"></div> Plantão</div>
      <div class="legend-item"><div class="legend-swatch swatch-today"></div> Hoje</div>
    </div>
  </div>

  <p class="hint">Toque em qualquer dia para marcar ou remover um plantão</p>

  <p class="section-title">Próximos plantões</p>
  <div class="next-card" id="next-list"></div>
</main>

<div id="toast"></div>

<script>
const STORAGE_KEY = 'escala_uti_ufmg_v1';
const MESES = ['janeiro','fevereiro','março','abril','maio','junho','julho','agosto','setembro','outubro','novembro','dezembro'];
const DIAS_EXT = ['domingo','segunda-feira','terça-feira','quarta-feira','quinta-feira','sexta-feira','sábado'];

const now = new Date();
let viewYear = now.getFullYear();
let viewMonth = now.getMonth();
let plantoes = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let notifEnabled = Notification && Notification.permission === 'granted';

function dayKey(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function todayKey() {
  return dayKey(now.getFullYear(), now.getMonth(), now.getDate());
}

function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(plantoes));
}

function toggleDay(y, m, d) {
  const k = dayKey(y, m, d);
  const adding = !plantoes[k];
  if (adding) plantoes[k] = true;
  else delete plantoes[k];
  save();
  render();
  showToast(adding ? '✓ Plantão adicionado' : 'Plantão removido');
  if (notifEnabled) scheduleAllNotifs();
}

function render() {
  renderStats();
  renderCalendar();
  renderNext();
  updateNotifBtn();
}

function renderStats() {
  const prefix = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-`;
  const thisMonth = Object.keys(plantoes).filter(k => k.startsWith(prefix)).length;
  const total = Object.keys(plantoes).length;
  const upcoming = getUpcoming(100).length;
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Este mês</div><div class="stat-value">${thisMonth}</div><div class="stat-sub">plantões</div></div>
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${total}</div><div class="stat-sub">cadastrados</div></div>
    <div class="stat-card"><div class="stat-label">A partir de hoje</div><div class="stat-value">${upcoming}</div><div class="stat-sub">futuros</div></div>
  `;
}

function renderCalendar() {
  document.getElementById('cal-title').textContent = `${MESES[viewMonth]} de ${viewYear}`;
  const grid = document.getElementById('days-grid');
  grid.innerHTML = '';
  const firstDay = new Date(viewYear, viewMonth, 1).getDay();
  const totalDays = new Date(viewYear, viewMonth + 1, 0).getDate();
  const tk = todayKey();

  for (let i = 0; i < firstDay; i++) {
    const el = document.createElement('div');
    el.className = 'day empty';
    grid.appendChild(el);
  }
  for (let d = 1; d <= totalDays; d++) {
    const k = dayKey(viewYear, viewMonth, d);
    const isToday = k === tk;
    const isPlantao = !!plantoes[k];
    const el = document.createElement('div');
    let cls = 'day';
    if (isToday) cls += ' today';
    if (isPlantao) cls += ' plantao';
    el.className = cls;
    el.setAttribute('role', 'button');
    el.setAttribute('aria-label', `${d} de ${MESES[viewMonth]}${isPlantao ? ' — plantão marcado' : ''}`);
    el.innerHTML = `<span class="day-num">${d}</span>${isPlantao ? '<div class="day-dot"></div>' : ''}`;
    el.addEventListener('click', () => toggleDay(viewYear, viewMonth, d));
    grid.appendChild(el);
  }
}

function getUpcoming(n) {
  const tk = todayKey();
  return Object.keys(plantoes).filter(k => k >= tk).sort().slice(0, n);
}

function renderNext() {
  const up = getUpcoming(6);
  const container = document.getElementById('next-list');
  if (!up.length) {
    container.innerHTML = '<div class="next-empty">Nenhum plantão cadastrado ainda.<br>Toque em um dia para adicionar.</div>';
    return;
  }
  const tk = todayKey();
  container.innerHTML = up.map(k => {
    const [y, m, d] = k.split('-').map(Number);
    const dt = new Date(y, m-1, d);
    const diasAte = Math.round((dt - new Date(now.getFullYear(), now.getMonth(), now.getDate())) / 86400000);
    const isSoon = diasAte <= 3;
    const label = diasAte === 0 ? 'Hoje!' : diasAte === 1 ? 'Amanhã' : `em ${diasAte} dias`;
    return `
      <div class="next-item">
        <div class="next-dot${isSoon ? ' soon' : ''}"></div>
        <div class="next-info">
          <div class="next-date">${d} de ${MESES[m-1]} de ${y}</div>
          <div class="next-weekday">${DIAS_EXT[dt.getDay()]}</div>
        </div>
        ${isSoon ? `<span class="next-badge">${label}</span>` : `<span style="font-size:12px;color:var(--text-hint)">${label}</span>`}
        <button class="next-remove" onclick="removeShift('${k}')" aria-label="Remover plantão">
          <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
  }).join('');
}

function removeShift(k) {
  delete plantoes[k];
  save();
  render();
  showToast('Plantão removido');
}

function changeMonth(dir) {
  viewMonth += dir;
  if (viewMonth > 11) { viewMonth = 0; viewYear++; }
  if (viewMonth < 0) { viewMonth = 11; viewYear--; }
  render();
}

async function requestNotif() {
  if (!('Notification' in window)) { showToast('Navegador não suporta notificações'); return; }
  if (Notification.permission === 'granted') { notifEnabled = true; updateNotifBtn(); scheduleAllNotifs(); return; }
  const perm = await Notification.requestPermission();
  if (perm === 'granted') {
    notifEnabled = true;
    updateNotifBtn();
    scheduleAllNotifs();
    showToast('✓ Alertas ativados!');
  } else {
    showToast('Permissão negada nas configurações');
  }
}

function updateNotifBtn() {
  const btn = document.getElementById('btn-notif');
  const label = document.getElementById('notif-label');
  if (notifEnabled) {
    btn.classList.add('active');
    label.textContent = 'Alertas ativos';
  } else {
    btn.classList.remove('active');
    label.textContent = 'Ativar alertas';
  }
}

function scheduleAllNotifs() {
  const up = getUpcoming(14);
  up.forEach(k => {
    const [y, m, d] = k.split('-').map(Number);
    const vespera = new Date(y, m-1, d-1, 20, 0, 0);
    const ms = vespera - new Date();
    if (ms > 0 && ms < 8 * 24 * 60 * 60 * 1000) {
      setTimeout(() => {
        new Notification('Plantão amanhã — UTI UFMG', {
          body: `Lembrete: plantão amanhã, ${d} de ${MESES[m-1]}.`,
        });
      }, ms);
    }
  });
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

render();
</script>
</body>
</html>
